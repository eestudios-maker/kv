<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KV Catalogue</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:        #fdf0f5;
  --surface:   #ffffff;
  --surface2:  #fef7fa;
  --border:    #f0d5e4;
  --border2:   #e8c0d4;
  --accent:    #d4547a;
  --accent-h:  #bc3f65;
  --accent-s:  #fce4ed;
  --text:      #28121e;
  --muted:     #9c7287;
  --faint:     #c8a8b8;

  --live:      #16a34a;
  --prod:      #d97706;
  --ready:     #7c3aed;
  --backlog:   #94a3b8;

  --mv:        #d4547a;
  --single:    #7c3aed;
  --collab:    #0891b2;
  --lyric:     #059669;
  --bts:       #d97706;
  --album:     #be185d;

  --font-head: 'Playfair Display', Georgia, serif;
  --font-body: 'DM Sans', system-ui, sans-serif;
  --r:         14px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-weight: 300;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse at 0% 0%, rgba(212,84,122,0.07) 0%, transparent 50%),
    radial-gradient(ellipse at 100% 100%, rgba(252,228,237,0.9) 0%, transparent 50%);
}

/* ── LOADING ──────────────────────────────────────────── */
#loading {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 999;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px;
  transition: opacity 0.4s;
}
#loading.gone { opacity: 0; pointer-events: none; }
.ld-title {
  font-family: var(--font-head);
  font-size: 34px; font-weight: 600;
  color: var(--text);
}
.ld-title em { color: var(--accent); font-style: italic; }
.ld-sub {
  font-size: 11px; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--faint);
}
.ld-dots { display: flex; gap: 7px; }
.ld-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--accent);
  animation: blink 1.2s ease-in-out infinite;
}
.ld-dot:nth-child(2) { animation-delay: 0.2s; }
.ld-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink {
  0%,80%,100% { opacity: 0.2; transform: scale(0.75); }
  40% { opacity: 1; transform: scale(1); }
}

/* ── TOAST ────────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 500;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 9px 16px;
  font-size: 11px; color: var(--muted);
  display: flex; align-items: center; gap: 7px;
  opacity: 0; transition: opacity 0.3s;
  pointer-events: none;
  box-shadow: 0 4px 20px rgba(212,84,122,0.08);
}
#toast.show { opacity: 1; }
.toast-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--live); }

/* ── HEADER ───────────────────────────────────────────── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 18px 40px;
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 24px rgba(212,84,122,0.05);
}
.brand { display: flex; flex-direction: column; gap: 1px; }
.brand-kicker {
  font-size: 10px; letter-spacing: 0.28em;
  text-transform: uppercase; color: var(--accent);
  font-weight: 400;
}
.brand-title {
  font-family: var(--font-head);
  font-size: 26px; font-weight: 600;
  color: var(--text); line-height: 1.1;
}
.brand-title em { color: var(--accent); font-style: italic; }

.header-r { display: flex; align-items: center; gap: 10px; }
.date-pill {
  font-size: 11px; color: var(--muted);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 14px;
  white-space: nowrap;
}
.add-btn {
  background: var(--accent); color: #fff;
  border: none; border-radius: 20px;
  padding: 9px 22px;
  font-family: var(--font-body); font-size: 13px; font-weight: 500;
  cursor: pointer; letter-spacing: 0.02em;
  display: flex; align-items: center; gap: 6px;
  transition: all 0.18s;
}
.add-btn:hover {
  background: var(--accent-h);
  transform: translateY(-1px);
  box-shadow: 0 6px 18px rgba(212,84,122,0.28);
}

/* ── STATS ────────────────────────────────────────────── */
.stats-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 40px;
  display: flex; align-items: center; gap: 28px;
  overflow-x: auto;
}
.s-item { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.s-dot { width: 8px; height: 8px; border-radius: 50%; }
.s-num {
  font-family: var(--font-head);
  font-size: 20px; font-weight: 600;
  color: var(--text);
}
.s-lbl {
  font-size: 11px; color: var(--muted);
  letter-spacing: 0.07em; text-transform: uppercase;
}
.s-sep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }

/* ── FILTERS ──────────────────────────────────────────── */
.filters {
  padding: 14px 40px;
  display: flex; align-items: center; gap: 8px;
  flex-wrap: wrap;
}
.f-label {
  font-size: 11px; color: var(--faint);
  letter-spacing: 0.08em; text-transform: uppercase;
  margin-right: 4px;
}
.f-chip {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 14px;
  font-family: var(--font-body); font-size: 12px;
  color: var(--muted); cursor: pointer;
  transition: all 0.15s;
}
.f-chip:hover { border-color: var(--accent); color: var(--accent); }
.f-chip.on {
  background: var(--accent-s);
  border-color: var(--accent);
  color: var(--accent); font-weight: 500;
}
.search-wrap { position: relative; margin-left: auto; }
.search-in {
  background: var(--surface);
  border: 1px solid var(--border); border-radius: 20px;
  padding: 7px 16px 7px 32px;
  font-family: var(--font-body); font-size: 12px;
  color: var(--text); outline: none;
  width: 190px; transition: border-color 0.15s;
}
.search-in:focus { border-color: var(--accent); }
.search-in::placeholder { color: var(--faint); }
.search-ico {
  position: absolute; left: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--faint); font-size: 11px; pointer-events: none;
}

/* ── MAIN ─────────────────────────────────────────────── */
.main {
  padding: 28px 40px 80px;
  max-width: 920px; margin: 0 auto;
}

/* ── MONTH GROUP ──────────────────────────────────────── */
.month-group { margin-bottom: 40px; }
.month-hd {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 14px;
}
.month-name {
  font-family: var(--font-head);
  font-size: 15px; font-style: italic;
  color: var(--accent); white-space: nowrap;
}
.month-line { flex: 1; height: 1px; background: var(--border); }
.month-ct {
  font-size: 10px; color: var(--faint);
  letter-spacing: 0.06em; white-space: nowrap;
}

/* ── CARD ─────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px 18px;
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 16px;
  cursor: pointer; position: relative; overflow: hidden;
  transition: all 0.18s;
}
.card::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; border-radius: var(--r) 0 0 var(--r);
}
.card.mv::before     { background: var(--mv); }
.card.single::before { background: var(--single); }
.card.collab::before { background: var(--collab); }
.card.lyric::before  { background: var(--lyric); }
.card.bts::before    { background: var(--bts); }
.card.album::before  { background: var(--album); }

.card:hover {
  border-color: rgba(212,84,122,0.3);
  box-shadow: 0 4px 20px rgba(212,84,122,0.09);
  transform: translateY(-1px);
}
.card.is-live { opacity: 0.72; }

.card-body { flex: 1; min-width: 0; }
.card-title {
  font-size: 14px; font-weight: 500;
  color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 3px;
}
.card-artist { font-size: 11px; color: var(--muted); }
.card-note { font-size: 10px; color: var(--faint); font-style: italic; margin-top: 1px; }
.yt-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; color: #ef4444; text-decoration: none;
  margin-top: 3px; transition: opacity 0.15s;
}
.yt-badge:hover { opacity: 0.7; text-decoration: underline; }

.card-r {
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.card-date { font-size: 11px; color: var(--faint); white-space: nowrap; }

/* chips */
.chip {
  font-size: 10px; font-weight: 500;
  letter-spacing: 0.05em; text-transform: uppercase;
  border-radius: 10px; padding: 2px 9px; white-space: nowrap;
}
.chip.mv     { background: rgba(212,84,122,0.1);  color: var(--mv); }
.chip.single { background: rgba(124,58,237,0.1);  color: var(--single); }
.chip.collab { background: rgba(8,145,178,0.1);   color: var(--collab); }
.chip.lyric  { background: rgba(5,150,105,0.1);   color: var(--lyric); }
.chip.bts    { background: rgba(217,119,6,0.1);   color: var(--bts); }
.chip.album  { background: rgba(190,24,93,0.1);   color: var(--album); }

.schip {
  font-size: 10px; font-weight: 500;
  letter-spacing: 0.05em; text-transform: uppercase;
  border-radius: 10px; padding: 3px 9px; white-space: nowrap;
}
.schip.backlog    { background: rgba(148,163,184,0.14); color: var(--backlog); }
.schip.production { background: rgba(217,119,6,0.1);   color: var(--prod); }
.schip.ready      { background: rgba(124,58,237,0.1);  color: var(--ready); }
.schip.live       { background: rgba(22,163,74,0.1);   color: var(--live); }

.card-acts {
  display: flex; gap: 3px; opacity: 0; transition: opacity 0.15s;
}
.card:hover .card-acts { opacity: 1; }
.act-btn {
  background: none; border: none; cursor: pointer;
  padding: 4px 5px; border-radius: 6px;
  font-size: 12px; color: var(--faint);
  transition: all 0.12s; line-height: 1;
}
.act-btn:hover { background: var(--bg); color: var(--muted); }
.act-btn.del:hover { color: #ef4444; }

/* ── EMPTY ────────────────────────────────────────────── */
.empty {
  text-align: center; padding: 70px 20px;
  color: var(--faint);
}
.empty-ico { font-size: 40px; margin-bottom: 14px; }
.empty-txt { font-size: 13px; letter-spacing: 0.04em; }

/* ── MODAL ────────────────────────────────────────────── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(40,18,30,0.38);
  z-index: 200; align-items: center; justify-content: center;
  backdrop-filter: blur(5px);
}
.overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border-radius: 20px;
  padding: 30px 28px 24px;
  width: 440px; max-width: 93vw;
  position: relative;
  animation: popIn 0.22s cubic-bezier(0.34,1.56,0.64,1);
  max-height: 93vh; overflow-y: auto;
  border: 1px solid var(--border);
  box-shadow: 0 24px 64px rgba(212,84,122,0.14);
}
@keyframes popIn {
  from { opacity:0; transform: translateY(18px) scale(0.96); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}
.modal-x {
  position: absolute; top: 16px; right: 18px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 50%; width: 28px; height: 28px;
  cursor: pointer; color: var(--muted); font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.modal-x:hover { border-color: var(--accent); color: var(--accent); }

.modal-h { font-family: var(--font-head); font-size: 22px; margin-bottom: 4px; }
.modal-sub { font-size: 12px; color: var(--muted); margin-bottom: 22px; }

.fg { margin-bottom: 15px; }
.fl { display: block; font-size: 11px; color: var(--muted); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 6px; }
.fi, .fs, .ft {
  width: 100%; background: var(--bg);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 9px 13px;
  font-family: var(--font-body); font-size: 13px;
  color: var(--text); outline: none;
  transition: border-color 0.15s;
}
.fi:focus, .fs:focus, .ft:focus { border-color: var(--accent); background: #fff; }
.ft { resize: vertical; min-height: 68px; }
.fs { cursor: pointer; }
.fr { display: flex; gap: 12px; }
.fr .fg { flex: 1; }

/* status toggle pills in modal */
.status-pills { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 2px; }
.s-pill {
  flex: 1; min-width: 74px;
  padding: 7px 6px;
  border-radius: 9px; border: 1px solid var(--border);
  background: transparent;
  font-family: var(--font-body); font-size: 11px; font-weight: 500;
  letter-spacing: 0.04em; text-transform: uppercase;
  color: var(--muted); cursor: pointer; transition: all 0.14s;
  text-align: center;
}
.s-pill:hover { border-color: var(--border2); color: var(--text); }
.s-pill.sel-backlog    { background: rgba(148,163,184,0.14); border-color: var(--backlog);    color: var(--backlog); }
.s-pill.sel-production { background: rgba(217,119,6,0.1);   border-color: var(--prod);       color: var(--prod); }
.s-pill.sel-ready      { background: rgba(124,58,237,0.1);  border-color: var(--ready);      color: var(--ready); }
.s-pill.sel-live       { background: rgba(22,163,74,0.1);   border-color: var(--live);       color: var(--live); }

.modal-btns { display: flex; gap: 9px; margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--border); }
.btn { flex: 1; padding: 10px 16px; border-radius: 10px; font-family: var(--font-body); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: none; }
.btn-p { background: var(--accent); color: #fff; }
.btn-p:hover { background: var(--accent-h); }
.btn-s { background: var(--bg); color: var(--muted); border: 1px solid var(--border); flex: 0 0 auto; padding: 10px 16px; }
.btn-s:hover { color: var(--text); border-color: var(--border2); }
.btn-d { background: transparent; color: #ef4444; border: 1px solid rgba(239,68,68,0.25); flex: 0 0 auto; padding: 10px 13px; }
.btn-d:hover { background: rgba(239,68,68,0.06); }

.del-confirm {
  display: none; margin-top: 14px;
  background: rgba(239,68,68,0.05);
  border: 1px solid rgba(239,68,68,0.18);
  border-radius: 10px; padding: 14px;
  text-align: center;
}
.del-confirm.open { display: block; }
.del-msg { font-size: 12px; color: #ef4444; margin-bottom: 11px; }
.del-btns { display: flex; gap: 8px; }
.btn-kill { background: #ef4444; color: #fff; border: none; }
.btn-kill:hover { background: #dc2626; }

/* ── RESPONSIVE ───────────────────────────────────────── */
@media (max-width: 680px) {
  header { padding: 14px 20px; }
  .stats-bar { padding: 10px 20px; gap: 16px; }
  .filters { padding: 12px 20px; }
  .main { padding: 20px 20px 60px; }
  .brand-title { font-size: 21px; }
  .card-date { display: none; }
  .search-in { width: 130px; }
}
@media (max-width: 420px) {
  .header-r .date-pill { display: none; }
  .card-r { gap: 6px; }
  .chip { display: none; }
}

/* ── SCROLLBAR ────────────────────────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="ld-title">KV <em>Catalogue</em></div>
  <div class="ld-sub">Loading your releases…</div>
  <div class="ld-dots">
    <div class="ld-dot"></div>
    <div class="ld-dot"></div>
    <div class="ld-dot"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"><div class="toast-dot"></div><span id="toast-txt">Saved</span></div>

<!-- HEADER -->
<header>
  <div class="brand">
    <div class="brand-kicker">♪ content calendar</div>
    <div class="brand-title">KV <em>Catalogue</em></div>
  </div>
  <div class="header-r">
    <div class="date-pill" id="today-pill"></div>
    <button class="add-btn" id="add-btn">＋ Add Release</button>
  </div>
</header>

<!-- STATS -->
<div class="stats-bar">
  <div class="s-item">
    <div class="s-dot" style="background:var(--accent)"></div>
    <span class="s-num" id="st-total">0</span>
    <span class="s-lbl">Total</span>
  </div>
  <div class="s-sep"></div>
  <div class="s-item">
    <div class="s-dot" style="background:var(--live)"></div>
    <span class="s-num" id="st-live">0</span>
    <span class="s-lbl">Live</span>
  </div>
  <div class="s-sep"></div>
  <div class="s-item">
    <div class="s-dot" style="background:var(--prod)"></div>
    <span class="s-num" id="st-prod">0</span>
    <span class="s-lbl">In Production</span>
  </div>
  <div class="s-sep"></div>
  <div class="s-item">
    <div class="s-dot" style="background:var(--ready)"></div>
    <span class="s-num" id="st-ready">0</span>
    <span class="s-lbl">Ready</span>
  </div>
  <div class="s-sep"></div>
  <div class="s-item">
    <div class="s-dot" style="background:var(--backlog)"></div>
    <span class="s-num" id="st-backlog">0</span>
    <span class="s-lbl">Backlog</span>
  </div>
</div>

<!-- FILTERS -->
<div class="filters">
  <span class="f-label">Show</span>
  <button class="f-chip on"  data-f="all">All</button>
  <button class="f-chip"     data-f="mv">MV</button>
  <button class="f-chip"     data-f="single">Single</button>
  <button class="f-chip"     data-f="collab">Collab</button>
  <button class="f-chip"     data-f="album">Album</button>
  <button class="f-chip"     data-f="__live">Live ✓</button>
  <button class="f-chip"     data-f="__backlog">Backlog</button>
  <div class="search-wrap">
    <span class="search-ico">🔍</span>
    <input class="search-in" id="search" type="text" placeholder="Search…"/>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="main"></div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <button class="modal-x" id="mx">✕</button>
    <div class="modal-h" id="m-head">New Release</div>
    <div class="modal-sub" id="m-sub">Add a new entry to the catalogue</div>

    <div class="fg">
      <label class="fl">Title *</label>
      <input class="fi" id="f-title" type="text" placeholder="e.g. Be For Real"/>
    </div>
    <div class="fr">
      <div class="fg">
        <label class="fl">Artist</label>
        <input class="fi" id="f-artist" type="text" placeholder="KV"/>
      </div>
      <div class="fg">
        <label class="fl">Type</label>
        <select class="fs" id="f-type">
          <option value="mv">Music Video (MV)</option>
          <option value="single">Single Release</option>
          <option value="collab">Collab / Feature</option>
          <option value="lyric">Lyric Video</option>
          <option value="bts">BTS / Vlog</option>
          <option value="album">Album / EP</option>
        </select>
      </div>
    </div>
    <div class="fr">
      <div class="fg">
        <label class="fl">Release Date</label>
        <input class="fi" id="f-date" type="date"/>
      </div>
    </div>
    <div class="fg">
      <label class="fl">Status</label>
      <div class="status-pills" id="status-pills">
        <button class="s-pill" data-s="backlog">Backlog</button>
        <button class="s-pill" data-s="production">In Production</button>
        <button class="s-pill" data-s="ready">Ready</button>
        <button class="s-pill" data-s="live">Live ✓</button>
      </div>
    </div>
    <div class="fg">
      <label class="fl">YouTube URL <span style="color:var(--faint);font-size:10px;">(paste when live)</span></label>
      <input class="fi" id="f-yt" type="url" placeholder="https://youtube.com/watch?v=…"/>
    </div>
    <div class="fg">
      <label class="fl">Notes</label>
      <textarea class="ft" id="f-notes" placeholder="e.g. waiting on mix, MV in edit…"></textarea>
    </div>

    <div class="del-confirm" id="del-confirm">
      <div class="del-msg">Remove this from the catalogue?</div>
      <div class="del-btns">
        <button class="btn btn-kill" id="confirm-del">Yes, remove</button>
        <button class="btn btn-s" id="cancel-del">Never mind</button>
      </div>
    </div>

    <div class="modal-btns">
      <button class="btn btn-p" id="m-save">Save</button>
      <button class="btn btn-d" id="m-del" title="Remove">🗑</button>
      <button class="btn btn-s" id="m-cancel">Cancel</button>
    </div>
  </div>
</div>

<script>
var LSK = 'kv_catalogue_v2';

var SEED = [
  {id:'r1', title:'Be For Real',         artist:'KV',               type:'mv',     date:'2026-03-25', status:'production', yt:'', notes:'[with MV]'},
  {id:'r2', title:'NN',                  artist:'KV & Pino G',      type:'mv',     date:'2026-04-01', status:'production', yt:'', notes:'[with MV]'},
  {id:'r3', title:'Paano Iiwasan',       artist:'KV',               type:'single', date:'2026-04-08', status:'production', yt:'', notes:'Single release'},
  {id:'b1', title:'Collab Track',        artist:'KV & Loonie',      type:'collab', date:'',           status:'backlog',    yt:'', notes:''},
  {id:'b2', title:'Collab Track',        artist:'KV feat. Hellmerry',type:'collab',date:'',           status:'backlog',    yt:'', notes:''},
  {id:'b3', title:'Can You Be Mine',     artist:'KV',               type:'single', date:'',           status:'backlog',    yt:'', notes:''},
  {id:'b4', title:'Aglio Olio',          artist:'KV',               type:'single', date:'',           status:'backlog',    yt:'', notes:''},
  {id:'b5', title:'Ngayong Gabi Uuwi Muli Sa Yakap Mo', artist:'KV',type:'single', date:'',           status:'backlog',    yt:'', notes:'City Girls'},
  {id:'b6', title:'Mahalaga Ka',         artist:'KV',               type:'single', date:'',           status:'backlog',    yt:'', notes:''},
  {id:'b7', title:'Oldrnb',              artist:'KV',               type:'single', date:'',           status:'backlog',    yt:'', notes:''},
  {id:'b8', title:'Pantasya',            artist:'KV',               type:'album',  date:'',           status:'backlog',    yt:'', notes:'Album / EP'},
];

// ── state ──────────────────────────────────────────────
var data = [];
var flt  = 'all';
var q    = '';
var eid  = null;    // editing id
var cur_status = 'backlog';
var toastTimer = null;

// ── persist ────────────────────────────────────────────
function save() {
  try { localStorage.setItem(LSK, JSON.stringify(data)); }
  catch(e) {}
  toast('Saved ✓');
}
function load() {
  try {
    var r = localStorage.getItem(LSK);
    if (r) { data = JSON.parse(r); return; }
  } catch(e) {}
  data = SEED.map(function(x){ return Object.assign({}, x); });
}
function toast(msg) {
  var el = document.getElementById('toast');
  document.getElementById('toast-txt').textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 2000);
}

// ── helpers ────────────────────────────────────────────
function uid() { return 'x' + Date.now() + Math.random().toString(36).slice(2,6); }

function typeLbl(t) {
  return {mv:'MV', single:'Single', collab:'Collab', lyric:'Lyric', bts:'BTS', album:'Album'}[t] || t;
}
function statusLbl(s) {
  return {backlog:'Backlog', production:'In Production', ready:'Ready', live:'Live'}[s] || s;
}
function fmtDate(d) {
  if (!d) return 'TBD';
  var dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
}
function monthKey(d) { return d ? d.slice(0,7) : 'zz'; }
function monthLbl(k) {
  if (k === 'zz') return 'Backlog / TBD';
  var dt = new Date(k + '-01T00:00:00');
  return dt.toLocaleDateString('en-US', {month:'long', year:'numeric'});
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── filter ─────────────────────────────────────────────
function filtered() {
  return data.filter(function(r){
    if (flt === '__live')    return r.status === 'live';
    if (flt === '__backlog') return r.status === 'backlog';
    if (flt !== 'all' && r.type !== flt) return false;
    if (q) {
      var lq = q.toLowerCase();
      if ((r.title||'').toLowerCase().indexOf(lq) < 0 &&
          (r.artist||'').toLowerCase().indexOf(lq) < 0) return false;
    }
    return true;
  });
}

// ── render ─────────────────────────────────────────────
function render() {
  var list = filtered();
  var main = document.getElementById('main');

  // group by month
  var groups = {}, keys = [];
  list.forEach(function(r){
    var k = monthKey(r.date);
    if (!groups[k]) { groups[k] = []; keys.push(k); }
    groups[k].push(r);
  });
  keys.sort();

  if (!keys.length) {
    main.innerHTML = '<div class="empty"><div class="empty-ico">🎵</div><div class="empty-txt">No releases found</div></div>';
    updateStats(); return;
  }

  main.innerHTML = keys.map(function(k){
    var items = groups[k].slice().sort(function(a,b){
      if (!a.date && !b.date) return 0;
      if (!a.date) return 1; if (!b.date) return -1;
      return a.date < b.date ? -1 : 1;
    });
    return '<div class="month-group">' +
      '<div class="month-hd">' +
        '<div class="month-name">' + monthLbl(k) + '</div>' +
        '<div class="month-line"></div>' +
        '<div class="month-ct">' + items.length + ' release' + (items.length!==1?'s':'') + '</div>' +
      '</div>' +
      items.map(buildCard).join('') +
    '</div>';
  }).join('');

  // wire clicks
  main.querySelectorAll('.card').forEach(function(el){
    el.addEventListener('click', function(e){
      if (e.target.closest('.act-btn')) return;
      openEdit(el.dataset.id);
    });
  });
  main.querySelectorAll('.act-btn.edit').forEach(function(el){
    el.addEventListener('click', function(e){ e.stopPropagation(); openEdit(el.dataset.id); });
  });
  main.querySelectorAll('.act-btn.del').forEach(function(el){
    el.addEventListener('click', function(e){ e.stopPropagation(); openEdit(el.dataset.id, true); });
  });

  updateStats();
}

function buildCard(r) {
  var ytEl = r.yt
    ? '<a class="yt-badge" href="' + esc(r.yt) + '" target="_blank" onclick="event.stopPropagation()">▶ Watch on YouTube</a>'
    : '';
  var noteEl = r.notes ? '<div class="card-note">' + esc(r.notes.slice(0,60)) + '</div>' : '';
  return '<div class="card ' + r.type + (r.status==='live'?' is-live':'') + '" data-id="' + r.id + '">' +
    '<div class="card-body">' +
      '<div class="card-title">' + esc(r.title) + '</div>' +
      '<div class="card-artist">' + esc(r.artist) + '</div>' +
      noteEl + ytEl +
    '</div>' +
    '<div class="card-r">' +
      '<div class="card-date">' + fmtDate(r.date) + '</div>' +
      '<span class="chip ' + r.type + '">' + typeLbl(r.type) + '</span>' +
      '<span class="schip ' + r.status + '">' + statusLbl(r.status) + '</span>' +
      '<div class="card-acts">' +
        '<button class="act-btn edit" data-id="' + r.id + '" title="Edit">✏️</button>' +
        '<button class="act-btn del"  data-id="' + r.id + '" title="Remove">🗑</button>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function updateStats() {
  document.getElementById('st-total').textContent   = data.length;
  document.getElementById('st-live').textContent    = data.filter(function(r){ return r.status==='live'; }).length;
  document.getElementById('st-prod').textContent    = data.filter(function(r){ return r.status==='production'; }).length;
  document.getElementById('st-ready').textContent   = data.filter(function(r){ return r.status==='ready'; }).length;
  document.getElementById('st-backlog').textContent = data.filter(function(r){ return r.status==='backlog'; }).length;
}

// ── status pills ───────────────────────────────────────
function setStatus(s) {
  cur_status = s;
  document.querySelectorAll('.s-pill').forEach(function(p){
    p.className = 's-pill' + (p.dataset.s === s ? ' sel-' + s : '');
  });
}

// ── modal open ─────────────────────────────────────────
function openAdd() {
  eid = null;
  document.getElementById('m-head').textContent = 'New Release';
  document.getElementById('m-sub').textContent  = 'Add a new entry to the catalogue';
  document.getElementById('f-title').value  = '';
  document.getElementById('f-artist').value = 'KV';
  document.getElementById('f-type').value   = 'mv';
  document.getElementById('f-date').value   = '';
  document.getElementById('f-yt').value     = '';
  document.getElementById('f-notes').value  = '';
  document.getElementById('del-confirm').classList.remove('open');
  document.getElementById('m-del').style.display = 'none';
  setStatus('backlog');
  document.getElementById('overlay').classList.add('open');
  setTimeout(function(){ document.getElementById('f-title').focus(); }, 80);
}

function openEdit(id, showDel) {
  var r = data.find(function(x){ return x.id===id; });
  if (!r) return;
  eid = id;
  document.getElementById('m-head').textContent = 'Edit Release';
  document.getElementById('m-sub').textContent  = r.artist + ' — ' + r.title;
  document.getElementById('f-title').value  = r.title;
  document.getElementById('f-artist').value = r.artist;
  document.getElementById('f-type').value   = r.type;
  document.getElementById('f-date').value   = r.date || '';
  document.getElementById('f-yt').value     = r.yt || '';
  document.getElementById('f-notes').value  = r.notes || '';
  document.getElementById('del-confirm').classList.remove('open');
  document.getElementById('m-del').style.display = '';
  setStatus(r.status);
  document.getElementById('overlay').classList.add('open');
  if (showDel) document.getElementById('del-confirm').classList.add('open');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  eid = null;
}

function saveModal() {
  var title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').focus(); return; }
  var obj = {
    id:     eid || uid(),
    title:  title,
    artist: document.getElementById('f-artist').value.trim() || 'KV',
    type:   document.getElementById('f-type').value,
    date:   document.getElementById('f-date').value,
    status: cur_status,
    yt:     document.getElementById('f-yt').value.trim(),
    notes:  document.getElementById('f-notes').value.trim(),
  };
  if (eid) {
    var i = data.findIndex(function(r){ return r.id===eid; });
    if (i >= 0) data[i] = obj;
  } else {
    data.push(obj);
  }
  save(); closeModal(); render();
}

function delEntry(id) {
  data = data.filter(function(r){ return r.id!==id; });
  save(); closeModal(); render();
}

// ── boot ───────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function(){
  // today
  document.getElementById('today-pill').textContent =
    new Date().toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'});

  load();

  setTimeout(function(){
    document.getElementById('loading').classList.add('gone');
    render();
  }, 650);

  // filter chips
  document.querySelectorAll('.f-chip').forEach(function(btn){
    btn.addEventListener('click', function(){
      document.querySelectorAll('.f-chip').forEach(function(b){ b.classList.remove('on'); });
      btn.classList.add('on');
      flt = btn.dataset.f;
      render();
    });
  });

  // search
  document.getElementById('search').addEventListener('input', function(){
    q = this.value.trim(); render();
  });

  // add btn
  document.getElementById('add-btn').addEventListener('click', openAdd);

  // modal close
  document.getElementById('mx').addEventListener('click', closeModal);
  document.getElementById('m-cancel').addEventListener('click', closeModal);
  document.getElementById('overlay').addEventListener('click', function(e){
    if (e.target === this) closeModal();
  });

  // save
  document.getElementById('m-save').addEventListener('click', saveModal);

  // delete
  document.getElementById('m-del').addEventListener('click', function(){
    if (eid) document.getElementById('del-confirm').classList.add('open');
  });
  document.getElementById('confirm-del').addEventListener('click', function(){
    if (eid) delEntry(eid);
  });
  document.getElementById('cancel-del').addEventListener('click', function(){
    document.getElementById('del-confirm').classList.remove('open');
  });

  // status pills
  document.querySelectorAll('.s-pill').forEach(function(p){
    p.addEventListener('click', function(){ setStatus(p.dataset.s); });
  });

  // keyboard
  document.addEventListener('keydown', function(e){
    if (e.key === 'Escape') closeModal();
    if ((e.metaKey||e.ctrlKey) && e.key==='Enter'){
      if (document.getElementById('overlay').classList.contains('open')) saveModal();
    }
  });
});
</script>
</body>
</html>
